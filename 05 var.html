<body>
  <h1 class="text">Welcom to rps game devloped by Youssef Ayman</h1>
  <div>
    <button class="game-buttons" onclick="Score(game(gameBotPlay(),'rock'))
">👊</button>
<button class="game-buttons" onclick="Score(game(gameBotPlay(),'scissor'))

;">✌️</button>
<button class="game-buttons" onclick="Score(game(gameBotPlay(),'paper'))

;">🖐️</button>
</div>

<button class="text rest" onclick="score.Wins=0;score.Losses=0;score.Ties=0">Rest</button>
  <script>
    
    let bot
   function gameBotPlay(){var randomNumber=Math.random();
 if (randomNumber>=1/1.5 && randomNumber<=3){
  console.log('Rock');
  return bot='Rock'
}
else if (randomNumber>=1/3&&randomNumber<2/3){
  console.log('paper');
  return bot='paper'  
}
else {
   console.log('Scissors');
  return bot='Scissors'
}}

function game(bot ,player){

if(player=='rock'){if(bot=='Scissors'){/*alert('You won 🤩')*/console.log('game win');return 'win'}
else if(bot=='paper'){/*alert('you lose 😭')*/console.log('game lose'); return 'lose'}
else {/*alert('it`s tie 👌')*/console.log('game tie r'); return 'tie'}}

 if(player=='scissor'){if(bot=='paper'){/*alert('You won 🤩')*/console.log('game win');return 'win'}
else if(bot=='Rock'){/*alert('you lose 😭')*/console.log('game lose'); return 'lose'}
else {/*alert('it`s tie 👌')*/console.log('game tie s'); return 'tie'}}

 if(player=='paper'){if(bot=='Rock'){/*alert('You won 🤩')*/console.log('game win');return 'win'}
else if(bot=='Scissors'){/*alert('you lose 😭')*/console.log('game lose'); return 'lose'}
else {/*alert('it`s tie 👌')*/ console.log('game tie paper');return 'tie'}}
}
const score= {
  Wins: 0,
  Losses: 0,
  Ties: 0
}
function Score(result){
  if(result=='win'){score.Wins+=1}
  else if(result=='lose'){score.Losses+=1}
  else if(result=='tie'){score.Ties+=1}
   alert('You '+result +'\nWins: '+score.Wins+' ,Losses: '+score.Losses+' ,Ties: '+score.Ties)
  console.log(score)
}
  </script>
